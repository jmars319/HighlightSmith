name: Pulse CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: corepack enable
      - id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pulse-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pulse-pnpm-
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/git
            ~/.cargo/registry
            apps/desktopapp/src-tauri/target
          key: ${{ runner.os }}-pulse-cargo-${{ hashFiles('apps/desktopapp/src-tauri/Cargo.lock', 'rust-toolchain.toml') }}
          restore-keys: |
            ${{ runner.os }}-pulse-cargo-
      - run: rustup show
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm build:service-bundle
      - run: pnpm run check:service-bundle
      - run: pnpm run typecheck
      - run: pnpm test
      - run: pnpm run smoke:studio
      - run: cargo fmt --all -- --check
        working-directory: apps/desktopapp/src-tauri
      - run: cargo clippy --all-targets -- -D warnings
        working-directory: apps/desktopapp/src-tauri
      - run: cargo test
        working-directory: apps/desktopapp/src-tauri
