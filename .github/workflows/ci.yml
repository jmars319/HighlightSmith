name: Pulse CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - run: rustup default stable
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm --filter @vaexcore/pulse-desktopapp typecheck
      - run: pnpm run smoke:studio
      - run: cargo fmt --all -- --check
        working-directory: apps/desktopapp/src-tauri
      - run: cargo test
        working-directory: apps/desktopapp/src-tauri
